name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Generate version
        run: echo "VERSION=v1.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Get joke
        run: |
          JOKE=$(curl -s https://api.chucknorris.io/jokes/random | jq -r '.value')
          echo "JOKE=$JOKE" >> $GITHUB_ENV

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git tag $VERSION
          git push origin $VERSION

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: Release ${{ env.VERSION }}
          body: |
            Chuck Norris Joke:
            ${{ env.JOKE }}

      - name: Update README
        run: |
          echo "## Latest Release Info" > temp.md
          echo "- Version: $VERSION" >> temp.md
          echo "- PR: ${{ github.event.head_commit.message }}" >> temp.md
          echo "- Joke: $JOKE" >> temp.md
          echo "" >> temp.md
          cat README.md >> temp.md
          mv temp.md README.md

          git add README.md
          git commit -m "update README"
          git push

      - name: Add comment with joke
        uses: actions/github-script@v6
        with:
          script: |
            const response = await fetch('https://api.chucknorris.io/jokes/random');
            const data = await response.json();
            const joke = data.value;

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `😂 Chuck Norris Joke:\n${joke}`
            })
